services:
  app:
    image: apsaraguari/painelgeral:latest
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-araguari2026}
      - JWT_SECRET=${JWT_SECRET:-mude-esta-chave-em-producao}
    volumes:
      - painel-data:/app/data
      - painel-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    expose:
      - "3000"

volumes:
  painel-data:
  painel-uploads:
